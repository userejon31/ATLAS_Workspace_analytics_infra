services:
	atlas_postgres:
		image: postgres:16-alpine
		container_name: atlas_postgres
		restart: unless-stopped
		env_file:
			- .env
		environment:
			POSTGRES_DB: ${POSTGRES_DB}
			POSTGRES_USER: ${POSTGRES_USER}
			POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
			PGDATA: ${PGDATA}
		ports:
			- "${POSTGRES_PORT}:5432"
		volumes:
			- postgres_data:${PGDATA}
			- ./init-scripts:/docker-entrypoint-initdb.d:ro
			- ./data:/seed-data:ro
		healthcheck:
			test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
			interval: 10s
			timeout: 5s
			retries: 5
			start_period: 20s
		logging:
			driver: json-file
			options:
				max-size: "10m"
				max-file: "3"
		networks:
			- atlas_net

volumes:
	postgres_data:

networks:
	atlas_net:
		driver: bridge
